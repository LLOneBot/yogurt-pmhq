services:
  pmhq:
    image: linyuchen/pmhq:latest
    container_name: pmhq
    privileged: true
    environment:
      - ENABLE_HEADLESS=true
      - AUTO_LOGIN_QQ=
    volumes:
      - qq_volume:/root/.config/QQ
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:13000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  yogurt:
    image: ghcr.io/llonebot/yogurt-pmhq:latest
    container_name: yogurt-pmhq
    platform: linux/amd64
    environment:
      - PMHQ_HOST=pmhq
      - PMHQ_PORT=13000
      - YOGURT_HOST=0.0.0.0
      - YOGURT_PORT=3000
      - YOGURT_ACCESS_TOKEN=change-me
      - HTTP_CORS_ORIGINS=
      - WEBHOOK_URLS=
      - WEBHOOK_ACCESS_TOKEN=
      - QUICK_LOGIN_UIN=
      - PRELOAD_CONTACTS=false
      - REPORT_SELF_MESSAGE=true
      - TRANSFORM_INCOMING_MFACE_TO_IMAGE=false
      - SKIP_SECURITY_CHECK=true
      - ANSI_LEVEL=ANSI256
      - CORE_LOG_LEVEL=DEBUG
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
    ports:
      - "3000:3000"
    depends_on:
      pmhq:
        condition: service_healthy
    networks:
      - app_network
    restart: unless-stopped

volumes:
  qq_volume:

networks:
  app_network:
    driver: bridge
